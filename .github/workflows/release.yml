name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: fndg
            asset_name: fndg-linux-amd64
          - os: macos-latest
            artifact_name: fndg
            asset_name: fndg-macos-amd64
          - os: windows-latest
            artifact_name: fndg.exe
            asset_name: fndg-windows-amd64.exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build (Linux / macOS)
      if: runner.os != 'Windows'
      run: make

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        install: make mingw-w64-x86_64-gcc
        path-type: inherit

    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: make

    - name: Rename Binary for Upload
      shell: bash
      run: mv build/${{ matrix.artifact_name }} build/${{ matrix.asset_name }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: build/${{ matrix.asset_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
